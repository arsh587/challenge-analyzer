<!DOCTYPE html>
<html>
<head>
  <title>InsightOS — Dynamic Analyzer (by Arsh)</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      padding:20px;
      background:#020617;
      color:white;
    }

    h1 { color:#22c55e; }

    input, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    button {
      background:#22c55e;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS</h1>
<p>Dynamic Data Analyzer — by Arsh</p>

<input type="file" id="fileInput">
<button onclick="analyze()">Analyze Data</button>

<div id="output"></div>
<canvas id="chart"></canvas>

<script>

let data = [];
let chart;

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function analyze(){

  if(data.length === 0){
    alert("Upload file first");
    return;
  }

  let cols = Object.keys(data[0]);

  let numeric = [];
  let categorical = [];

  cols.forEach(col=>{
    let val = data[0][col];
    if(!isNaN(val) && val !== "") numeric.push(col);
    else categorical.push(col);
  });

  let output = `<div class="card"><b>📊 Dataset</b><br>
  Rows: ${data.length}<br>
  Columns: ${cols.length}
  </div>`;

  let insights = "";

  // 🔢 Numeric analysis
  numeric.forEach(col=>{
    let vals = data.map(d=>Number(d[col])||0);

    let sum = vals.reduce((a,b)=>a+b,0);
    let avg = (sum/vals.length).toFixed(2);
    let max = Math.max(...vals);
    let min = Math.min(...vals);

    let zeroCount = vals.filter(v=>v===0).length;
    let zeroRate = (zeroCount/vals.length*100).toFixed(1);

    output += `<div class="card"><b>${col}</b><br>
    Avg: ${avg}<br>
    Min: ${min}<br>
    Max: ${max}<br>
    Zero %: ${zeroRate}%
    </div>`;

    if(zeroRate > 60){
      insights += `⚠️ ${col} has many zero values → low activity pattern<br>`;
    }

    if(max > avg*5){
      insights += `⚠️ ${col} highly skewed → few high performers dominate<br>`;
    }
  });

  // 🧩 Categorical
  categorical.forEach(col=>{
    let counts = {};

    data.forEach(d=>{
      let v = d[col] || "Unknown";
      counts[v] = (counts[v]||0)+1;
    });

    let sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);

    output += `<div class="card"><b>${col} distribution</b><br>`;
    sorted.slice(0,3).forEach(([k,v])=>{
      output += `${k}: ${v}<br>`;
    });
    output += `</div>`;

    let topRate = sorted[0][1]/data.length;

    if(topRate > 0.7){
      insights += `⚠️ ${col} dominated by single value (${sorted[0][0]})<br>`;
    }
  });

  // 📊 Chart (auto best categorical)
  let bestCat = categorical[0];

  if(bestCat){

    let counts = {};

    data.forEach(d=>{
      let v = d[bestCat];
      counts[v] = (counts[v]||0)+1;
    });

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
      type:"bar",
      data:{
        labels:Object.keys(counts),
        datasets:[{ data:Object.values(counts) }]
      }
    });
  }

  // 🧠 General insights
  insights += `
  👉 Compare top categories<br>
  👉 Segment high vs low values<br>
  👉 Check relationships between columns<br>
  `;

  document.getElementById("output").innerHTML = output + `
  <div class="card"><b>🧠 Insights</b><br>${insights}</div>
  `;
}

</script>

</body>
</html>

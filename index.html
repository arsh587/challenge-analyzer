<!DOCTYPE html>
<html>
<head>
  <title>Challenge Analyzer Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5;}
    textarea { width:100%; height:120px; }
    button { padding:10px; margin-top:10px; }
    select { padding:8px; margin-top:10px; margin-right:10px; }

    .card {
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h2>🚀 Challenge Analyzer Pro (V4)</h2>

<h3>Paste CSV Data</h3>
<textarea id="data"></textarea>

<h3>OR Upload CSV</h3>
<input type="file" id="fileInput">

<br>
<button onclick="loadData()">Analyze</button>

<br><br>

<select id="challenge"></select>
<select id="challenge2"></select>

<div id="output"></div>
<canvas id="chart"></canvas>

<!-- 🔥 SMART SUMMARY -->
<h2>📊 Smart Summary Analyzer</h2>

<div class="card">
<textarea id="summaryText" placeholder="Paste full report here..."></textarea>
<br>
<button onclick="parseSummary()">Analyze Summary</button>
</div>

<div id="summaryOutput"></div>
<canvas id="summaryChart"></canvas>

<script>

let data = [];
let chart;
let summaryChart;

// CSV Upload
document.getElementById("fileInput").addEventListener("change", function(e){
  let file = e.target.files[0];

  Papa.parse(file,{
    header:true,
    skipEmptyLines:true,
    complete:function(res){
      data = res.data;
      populateDropdown();
    }
  });
});

// Paste Data
function loadData(){
  let text = document.getElementById("data").value;

  Papa.parse(text,{
    header:true,
    skipEmptyLines:true,
    complete:function(res){
      data = res.data;
      populateDropdown();
    }
  });
}

// Dropdown
function populateDropdown(){
  let challenges = [...new Set(data.map(d => (d.challenge_id || "").trim()))];

  let d1 = document.getElementById("challenge");
  let d2 = document.getElementById("challenge2");

  d1.innerHTML = "";
  d2.innerHTML = "";

  challenges.forEach(c=>{
    if(!c) return;
    d1.add(new Option(c,c));
    d2.add(new Option(c,c));
  });

  analyze();
}

document.getElementById("challenge").onchange = analyze;
document.getElementById("challenge2").onchange = analyze;

// Stats
function getStats(ch){
  let f = data.filter(d => (d.challenge_id || "").trim() === ch);

  let total = f.length;
  let completed = f.filter(d => d.completed === "Yes").length;
  let zero = f.filter(d => Number(d.matches_played) === 0).length;

  let low = f.filter(d => Number(d.matches_played) <=1).length;
  let mid = f.filter(d => Number(d.matches_played)>=2 && Number(d.matches_played)<=3).length;
  let high = f.filter(d => Number(d.matches_played)>3).length;

  return {
    total,
    completion: total ? (completed/total*100) : 0,
    zero: total ? (zero/total*100) : 0,
    low, mid, high
  };
}

// Main analysis
function analyze(){

  let c1 = document.getElementById("challenge").value;
  let c2 = document.getElementById("challenge2").value;

  let s1 = getStats(c1);
  let s2 = getStats(c2);

  let insight = "";

  if(s1.zero > 40){
    insight = "🚨 High drop before first match → Activation issue";
  }
  else if(s1.completion < 40){
    insight = "⚠️ Low completion → Challenge too difficult or unclear";
  }
  else if(s1.completion > 70){
    insight = "🔥 Strong engagement → Challenge working well";
  }
  else{
    insight = "⚖️ Moderate performance → Needs optimization";
  }

  document.getElementById("output").innerHTML = `

  <div class="card">
  <b>Participants:</b> ${s1.total}<br>
  <b>Completion:</b> ${s1.completion.toFixed(1)}%<br>
  <b>Zero Match:</b> ${s1.zero.toFixed(1)}%
  </div>

  <div class="card">
  <b>User Segments</b><br>
  Low (0-1): ${s1.low}<br>
  Medium (2-3): ${s1.mid}<br>
  High (4+): ${s1.high}
  </div>

  <div class="card">
  <b>AI Insight:</b><br>${insight}
  </div>

  <div class="card">
  <b>Comparison (${c1} vs ${c2})</b><br>
  Completion Diff: ${(s1.completion - s2.completion).toFixed(1)}%<br>
  Zero Match Diff: ${(s1.zero - s2.zero).toFixed(1)}%
  </div>
  `;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Completion %", "Zero Match %"],
      datasets: [{
        label: c1,
        data: [s1.completion, s1.zero]
      }]
    }
  });
}

// 🔥 SUMMARY PARSER
function extractNumber(text, label){
  let regex = new RegExp(label + "[:]?\\s*(\\d+)", "i");
  let match = text.match(regex);
  return match ? Number(match[1]) : 0;
}

function parseSummary(){

  let text = document.getElementById("summaryText").value;

  let total = extractNumber(text, "Total Users Joined");
  let completed = extractNumber(text, "Total Users Completed");
  let zero = extractNumber(text, "Users who played 0 matches");
  let repeat = extractNumber(text, "Total Repeat Users");

  if(!total){
    alert("Couldn't detect data");
    return;
  }

  let completionRate = (completed/total*100).toFixed(1);
  let zeroRate = (zero/total*100).toFixed(1);
  let repeatRate = (repeat/total*100).toFixed(1);

  let insight = "";
  let rec = "";

  if(zeroRate > 40){
    insight += "🚨 Major drop before first match<br>";
    rec += "👉 Improve onboarding & nudges<br>";
  }

  if(completionRate < 10){
    insight += "⚠️ Very low completion<br>";
    rec += "👉 Simplify challenge & reward system<br>";
  }

  if(repeatRate < 20){
    insight += "⚠️ Low retention<br>";
    rec += "👉 Add streaks & engagement loops<br>";
  }

  document.getElementById("summaryOutput").innerHTML = `
  <div class="card">
  Completion: ${completionRate}%<br>
  Zero Match: ${zeroRate}%<br>
  Repeat: ${repeatRate}%
  </div>

  <div class="card">
  <b>AI Insights:</b><br>${insight}
  </div>

  <div class="card">
  <b>Recommendations:</b><br>${rec}
  </div>
  `;

  if(summaryChart) summaryChart.destroy();

  summaryChart = new Chart(document.getElementById("summaryChart"), {
    type: "bar",
    data: {
      labels: ["Completion %", "Zero %", "Repeat %"],
      datasets: [{
        label: "Summary",
        data: [completionRate, zeroRate, repeatRate]
      }]
    }
  });
}

</script>

</body>
</html>

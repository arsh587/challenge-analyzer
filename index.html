<!DOCTYPE html>
<html>
<head>
  <title>InsightOS Strict — by Arsh</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      padding:20px;
      background:#020617;
      color:white;
    }

    h1 { color:#38bdf8; }

    input, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    button {
      background:#38bdf8;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }

    canvas {
      background:white;
      border-radius:10px;
      margin-top:20px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS Strict</h1>
<p>Accurate Schema-Based Analyzer — by Arsh</p>

<input type="file" id="fileInput">
<button onclick="analyze()">Analyze Data</button>

<div id="output"></div>

<canvas id="chart"></canvas>

<script>

let data = [];
let chart;

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function isNumericColumn(col){
  let valid = data.filter(d => d[col] !== "" && d[col] !== undefined);
  let numericCount = valid.filter(d => !isNaN(d[col])).length;
  return numericCount / valid.length > 0.8;
}

function analyze(){

  if(data.length === 0){
    alert("Upload file first");
    return;
  }

  let cols = Object.keys(data[0]);

  let numeric = [];
  let categorical = [];

  cols.forEach(col=>{
    if(isNumericColumn(col)) numeric.push(col);
    else categorical.push(col);
  });

  let output = `<div class="card"><b>📊 Dataset</b><br>
  Rows: ${data.length}<br>
  Columns: ${cols.length}
  </div>`;

  let insights = "";

  // 🔢 Numeric Analysis (STRICT)
  numeric.forEach(col=>{
    let vals = data.map(d => Number(d[col])).filter(v => !isNaN(v));

    let avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2);
    let max = Math.max(...vals);
    let min = Math.min(...vals);

    let zeroRate = (vals.filter(v=>v===0).length / vals.length *100).toFixed(1);

    output += `<div class="card"><b>${col}</b><br>
    Avg: ${avg}<br>
    Min: ${min}<br>
    Max: ${max}<br>
    Zero %: ${zeroRate}%
    </div>`;

    if(zeroRate > 60){
      insights += `⚠️ ${col}: high zero values<br>`;
    }

    if(max > avg * 5){
      insights += `⚠️ ${col}: highly skewed distribution<br>`;
    }
  });

  // 🧩 Categorical Analysis (STRICT)
  categorical.forEach(col=>{
    let counts = {};

    data.forEach(d=>{
      let val = d[col] || "Unknown";
      counts[val] = (counts[val]||0)+1;
    });

    let sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);

    output += `<div class="card"><b>${col}</b><br>`;
    sorted.slice(0,3).forEach(([k,v])=>{
      output += `${k}: ${v}<br>`;
    });
    output += `</div>`;

    let topRate = sorted[0][1] / data.length;

    if(topRate > 0.7){
      insights += `⚠️ ${col}: dominated by ${sorted[0][0]}<br>`;
    }
  });

  // 🔗 Relationship (only if both exist)
  if(numeric.length > 0 && categorical.length > 0){

    let cat = categorical[0];
    let num = numeric[0];

    let group = {};

    data.forEach(d=>{
      let key = d[cat];
      let val = Number(d[num]);

      if(!isNaN(val)){
        if(!group[key]) group[key] = [];
        group[key].push(val);
      }
    });

    let result = Object.entries(group).map(([k,v])=>{
      let avg = v.reduce((a,b)=>a+b,0)/v.length;
      return [k, avg];
    });

    result.sort((a,b)=>b[1]-a[1]);

    output += `<div class="card"><b>🔗 ${cat} vs ${num}</b><br>`;
    result.slice(0,3).forEach(([k,v])=>{
      output += `${k}: ${v.toFixed(2)}<br>`;
    });
    output += `</div>`;

    // Chart
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
      type:"bar",
      data:{
        labels: result.slice(0,5).map(x=>x[0]),
        datasets:[{ data: result.slice(0,5).map(x=>x[1]) }]
      }
    });
  }

  insights += `
  👉 Analyze distribution differences<br>
  👉 Compare segments<br>
  👉 Look for extreme values<br>
  `;

  document.getElementById("output").innerHTML = output + `
  <div class="card"><b>🧠 Insights</b><br>${insights}</div>
  `;
}

</script>

</body>
</html>

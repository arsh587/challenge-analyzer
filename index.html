<!DOCTYPE html>
<html>
<head>
  <title>InsightOS by Arsh</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding:20px;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }

    h1 { color:#f59e0b; }

    textarea, input {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button {
      padding:12px;
      margin-top:10px;
      background:#f59e0b;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS</h1>
<p>Free Analytics Copilot — by Arsh</p>

<input type="file" id="fileInput">

<h3>🧠 Ask anything about your data</h3>
<textarea id="query" placeholder="e.g. how many users are active?"></textarea>

<button onclick="analyze()">Analyze</button>

<div id="output"></div>
<canvas id="chart"></canvas>

<script>

let data = [];

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function analyze(){

  if(data.length === 0){
    alert("Upload data first");
    return;
  }

  let q = document.getElementById("query").value.toLowerCase();

  let total = data.length;

  let active = data.filter(d => Number(d.Indidividual_matches_same_month) > 0).length;
  let inactive = total - active;

  let verified = data.filter(d => (d.Verification_status||"").toLowerCase()=="verified").length;

  let activeRate = (active/total*100).toFixed(1);

  let output = "";
  let insights = "";
  let chartData = [];

  // 🔥 QUERY ENGINE
  if(q.includes("active")){
    output += `Active Users: ${active} (${activeRate}%)<br>`;
    chartData = [active, inactive];
  }

  if(q.includes("inactive")){
    output += `Inactive Users: ${inactive}<br>`;
  }

  if(q.includes("verified")){
    output += `Verified Users: ${verified}<br>`;
  }

  if(q.includes("activation")){
    output += `Activation Rate: ${activeRate}%<br>`;
  }

  // fallback
  if(output === ""){
    output = `
    Total Users: ${total}<br>
    Active Users: ${active}<br>
    Activation Rate: ${activeRate}%
    `;
    chartData = [active, inactive];
  }

  // 🧠 INSIGHTS
  if(activeRate < 20){
    insights += "🚨 Low activation — onboarding issue<br>";
  }

  if(verified/total < 0.5){
    insights += "⚠️ Many users unverified<br>";
  }

  insights += `
  👉 Focus on first match experience<br>
  👉 Segment users by activity<br>
  `;

  document.getElementById("output").innerHTML = `
  <div class="card"><b>📊 Answer</b><br>${output}</div>
  <div class="card"><b>🧠 Insights</b><br>${insights}</div>
  <div class="card"><b>❓ Next</b><br>
  👉 Which users are most active?<br>
  👉 Which cities perform best?<br>
  👉 Do verified users play more?<br>
  </div>
  `;

  // Chart
  new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
      labels: ["Active","Inactive"],
      datasets: [{ data: chartData }]
    }
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>InsightOS Lite — by Arsh</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      padding:20px;
      background: linear-gradient(135deg,#020617,#0f172a);
      color:white;
    }

    h1 { color:#38bdf8; }

    input, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    button {
      background:#38bdf8;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS Lite</h1>
<p>Auto Data Analysis Tool — by Arsh</p>

<input type="file" id="fileInput">
<button onclick="analyze()">Analyze Data</button>

<div id="output"></div>
<canvas id="chart"></canvas>

<script>

let data = [];
let chart;

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function analyze(){

  if(data.length === 0){
    alert("Upload file first");
    return;
  }

  let totalRows = data.length;
  let columns = Object.keys(data[0]);

  let numericCols = [];
  let categoricalCols = [];

  columns.forEach(col=>{
    let val = data[0][col];
    if(!isNaN(val)) numericCols.push(col);
    else categoricalCols.push(col);
  });

  let output = `<div class="card"><b>📊 Overview</b><br>
  Rows: ${totalRows}<br>
  Columns: ${columns.length}
  </div>`;

  let insights = "";

  // Numeric analysis
  numericCols.forEach(col=>{
    let values = data.map(d=>Number(d[col])||0);
    let avg = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(2);
    let max = Math.max(...values);
    let min = Math.min(...values);

    output += `<div class="card"><b>${col}</b><br>
    Avg: ${avg}<br>Min: ${min}<br>Max: ${max}</div>`;

    if(avg < 1){
      insights += `⚠️ Low values in ${col}<br>`;
    }
  });

  // Categorical analysis
  categoricalCols.forEach(col=>{
    let counts = {};
    data.forEach(d=>{
      let val = d[col] || "Unknown";
      counts[val] = (counts[val]||0)+1;
    });

    let sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);

    output += `<div class="card"><b>Top ${col}</b><br>`;
    sorted.slice(0,3).forEach(([k,v])=>{
      output += `${k}: ${v}<br>`;
    });
    output += `</div>`;

    if(sorted[0][1] > totalRows * 0.7){
      insights += `⚠️ ${col} dominated by ${sorted[0][0]}<br>`;
    }
  });

  // Chart (first categorical)
  let sampleCol = categoricalCols[0];
  if(sampleCol){

    let counts = {};
    data.forEach(d=>{
      let v = d[sampleCol];
      counts[v] = (counts[v]||0)+1;
    });

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
      type:"bar",
      data:{
        labels:Object.keys(counts),
        datasets:[{ data:Object.values(counts) }]
      }
    });
  }

  document.getElementById("output").innerHTML = output + `
  <div class="card"><b>🧠 Insights</b><br>${insights}</div>

  <div class="card"><b>🚀 Suggested Analysis</b><br>
  👉 Segment users by activity<br>
  👉 Compare top categories<br>
  👉 Check distribution trends<br>
  </div>
  `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>InsightOS Pro — by Arsh</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      padding:20px;
      background:#0b1220;
      color:white;
    }

    h1 { color:#38bdf8; }

    textarea, input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:#1e293b;
      color:white;
    }

    button {
      padding:12px;
      margin-top:10px;
      background:#38bdf8;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS Pro</h1>
<p>Advanced Data Analytics Engine — by Arsh</p>

<input type="file" id="fileInput">

<h3>Ask anything about your data</h3>
<textarea id="query" placeholder="e.g. how many users joined and played from madhya pradesh with %"></textarea>

<button onclick="analyze()">Analyze</button>

<div id="output"></div>

<script>

let data = [];

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

// 🔥 smart column detection
function findColumn(keywords){
  let keys = Object.keys(data[0]);
  return keys.find(k => keywords.some(word => k.toLowerCase().includes(word)));
}

function analyze(){

  if(data.length === 0){
    alert("Upload data first");
    return;
  }

  let q = document.getElementById("query").value.toLowerCase();

  let stateCol = findColumn(["state","city","location"]);
  let matchCol = findColumn(["match","played","game"]);
  let joinCol = findColumn(["join","challenge"]);
  
  let total = data.length;
  let result = data;

  // 🔥 location
  let stateMatch = q.match(/from ([a-z ]+)/);
  if(stateMatch && stateCol){
    let state = stateMatch[1].trim();
    result = result.filter(d =>
      (d[stateCol]||"").toLowerCase().includes(state)
    );
  }

  // 🔥 played
  if(q.includes("played") || q.includes("active")){
    result = result.filter(d => Number(d[matchCol]) > 0);
  }

  // 🔥 joined
  if(q.includes("join")){
    result = result.filter(d =>
      (d[joinCol]||"").toLowerCase().includes("yes")
    );
  }

  let count = result.length;

  let percentage = ((count/total)*100).toFixed(1);

  let output = `<b>Answer:</b><br>${count} users`;

  if(q.includes("percent") || q.includes("%")){
    output += `<br>${percentage}% of total users`;
  }

  let insights = "";

  if(percentage < 20){
    insights += "🚨 Low segment size detected<br>";
  }

  insights += `
  👉 Compare with other states<br>
  👉 Check conversion rate<br>
  👉 Analyze behavior over time<br>
  `;

  document.getElementById("output").innerHTML = `
  <div class="card">${output}</div>
  <div class="card"><b>Insights</b><br>${insights}</div>
  `;
}

</script>

</body>
</html>

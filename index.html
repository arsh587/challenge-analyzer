<!DOCTYPE html>
<html>
<head>
  <title>InsightOS Pro — by Arsh</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding:20px;
      background: linear-gradient(135deg,#020617,#0f172a);
      color:white;
    }

    h1 { color:#f59e0b; }

    textarea, input {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button {
      padding:12px;
      margin-top:10px;
      background:#f59e0b;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS Pro</h1>
<p>Advanced Analytics Engine — by Arsh</p>

<input type="file" id="fileInput">

<h3>🧠 Ask anything about your data</h3>
<textarea id="query" placeholder="e.g. top city, avg matches, count by state"></textarea>

<button onclick="analyze()">Analyze</button>

<div id="output"></div>
<canvas id="chart"></canvas>

<script>

let data = [];
let chart;

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function analyze(){

  if(data.length === 0){
    alert("Upload data first");
    return;
  }

  let q = document.getElementById("query").value.toLowerCase();

  let keys = Object.keys(data[0]);

  let numericCols = [];
  let categoricalCols = [];

  keys.forEach(k=>{
    let val = data[0][k];
    if(!isNaN(val)) numericCols.push(k);
    else categoricalCols.push(k);
  });

  let output = "";
  let insights = "";

  // 🔥 COUNT BY CATEGORY
  if(q.includes("count by") || q.includes("top")){

    let col = categoricalCols.find(c => q.includes(c.toLowerCase())) || categoricalCols[0];

    let counts = {};

    data.forEach(d=>{
      let v = d[col];
      counts[v] = (counts[v]||0)+1;
    });

    let sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);

    output += `<b>Top ${col}</b><br>`;
    sorted.slice(0,5).forEach(([k,v])=>{
      output += `${k}: ${v}<br>`;
    });

    drawChart(sorted.slice(0,5));

    insights += `👉 ${col} drives user distribution<br>`;
  }

  // 🔥 AVERAGE
  else if(q.includes("average") || q.includes("avg")){

    let col = numericCols[0];

    let values = data.map(d=>Number(d[col])||0);
    let avg = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(2);

    output += `Average ${col}: ${avg}<br>`;

    if(avg < 1){
      insights += "🚨 Low engagement detected<br>";
    }
  }

  // 🔥 ACTIVE USERS DETECT
  else if(q.includes("active")){

    let col = numericCols.find(c=>c.toLowerCase().includes("match")) || numericCols[0];

    let active = data.filter(d=>Number(d[col])>0).length;
    let rate = (active/data.length*100).toFixed(1);

    output += `Active Users: ${active} (${rate}%)`;

    drawChart([["Active",active],["Inactive",data.length-active]]);

    if(rate < 20){
      insights += "🚨 Activation issue<br>";
    }
  }

  // fallback
  else {
    output += `Total rows: ${data.length}<br>`;
    insights += "👉 Try queries like 'top city', 'avg matches'<br>";
  }

  insights += `
  👉 Check segmentation<br>
  👉 Compare categories<br>
  👉 Identify drop-off stages<br>
  `;

  document.getElementById("output").innerHTML = `
  <div class="card"><b>📊 Answer</b><br>${output}</div>
  <div class="card"><b>🧠 Insights</b><br>${insights}</div>
  `;

}

function drawChart(dataArr){

  if(chart) chart.destroy();

  let labels = dataArr.map(x=>x[0]);
  let values = dataArr.map(x=>x[1]);

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Data",
        data: values
      }]
    }
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Analytics Copilot</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5;}
    textarea { width:100%; height:120px; margin-top:10px;}
    button { padding:10px; margin-top:10px;}

    .card {
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h2>🧠 Analytics Copilot</h2>

<h3>🎯 What do you want to analyze?</h3>
<textarea id="goal" placeholder="e.g. Identify high-intent users, best segments, challenge types..."></textarea>

<h3>📊 Upload / Paste Data</h3>
<textarea id="data"></textarea>
<input type="file" id="fileInput">

<br>
<button onclick="runAnalysis()">Analyze</button>

<div id="output"></div>

<script>

let data = [];

// CSV load
document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function runAnalysis(){

  let goal = document.getElementById("goal").value.toLowerCase();

  if(document.getElementById("data").value){
    Papa.parse(document.getElementById("data").value, {
      header:true,
      skipEmptyLines:true,
      complete: res => {
        data = res.data;
        analyzeGoal(goal);
      }
    });
  } else {
    analyzeGoal(goal);
  }
}

function analyzeGoal(goal){

  let insights = "";
  let metrics = "";
  let suggestions = "";

  // Example logic based on your dataset
  let total = data.length;

  let active = data.filter(d => Number(d.Indidividual_matches_same_month) > 0).length;
  let inactive = total - active;

  let verified = data.filter(d => (d.Verification_status || "").toLowerCase() === "verified").length;

  let activeRate = (active/total*100).toFixed(1);
  let verifiedRate = (verified/total*100).toFixed(1);

  // 🎯 Goal-based logic
  if(goal.includes("high intent") || goal.includes("segment")){

    metrics += `
    Total Users: ${total}<br>
    Active Users: ${active} (${activeRate}%)<br>
    Verified Users: ${verified} (${verifiedRate}%)
    `;

    insights += `
    🔍 High intent users are very low (${activeRate}%)<br>
    🔍 Most users are inactive after joining<br>
    `;

    suggestions += `
    👉 Focus on users who played at least 1 match<br>
    👉 Create onboarding nudges for inactive users<br>
    👉 Analyze verified vs unverified conversion<br>
    `;
  }

  // generic intelligence
  insights += `
  <br>🧠 Key Observations:<br>
  👉 Majority users are not engaging after signup<br>
  👉 Activation is the biggest drop-off point
  `;

  suggestions += `
  <br>🚀 What to check next:<br>
  👉 Match played within first 3 days<br>
  👉 Challenge join rate for active users<br>
  👉 State/city level performance<br>
  `;

  document.getElementById("output").innerHTML = `
  <div class="card"><b>📊 Metrics:</b><br>${metrics}</div>
  <div class="card"><b>🧠 Insights:</b><br>${insights}</div>
  <div class="card"><b>🚀 Suggestions:</b><br>${suggestions}</div>
  `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Insight Engine Tool</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5;}
    textarea { width:100%; height:120px; margin-top:10px;}
    button { padding:10px; margin-top:10px;}
    select { padding:8px; margin-top:10px; margin-right:10px;}

    .card {
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h2>🚀 Insight Engine (Growth Analytics Tool)</h2>

<!-- CSV ANALYZER -->
<h3>📊 Challenge Analyzer</h3>
<textarea id="data" placeholder="Paste CSV..."></textarea>
<input type="file" id="fileInput">
<br>
<button onclick="loadData()">Analyze CSV</button>

<br><br>
<select id="challenge"></select>
<select id="challenge2"></select>

<div id="output"></div>
<canvas id="chart"></canvas>

<!-- SUMMARY -->
<h3>📊 Smart Summary Analyzer</h3>
<textarea id="summaryText" placeholder="Paste report..."></textarea>
<button onclick="parseSummary()">Analyze Summary</button>

<div id="summaryOutput"></div>

<!-- FUNNEL -->
<h3>🚀 Funnel Analyzer</h3>
<textarea id="funnelText" placeholder="Paste funnel data..."></textarea>
<button onclick="analyzeFunnel()">Analyze Funnel</button>

<div id="funnelOutput"></div>

<!-- AI ENGINE -->
<h3>🧠 Insight Engine (ANY DATA)</h3>
<textarea id="aiInput" placeholder="Paste ANY data / report / CSV..."></textarea>
<button onclick="analyzeAI()">Get Insights</button>

<div id="aiOutput"></div>

<script>

let data = [];
let chart;

// CSV upload
document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => {
      data = res.data;
      populateDropdown();
    }
  });
});

function loadData(){
  Papa.parse(document.getElementById("data").value, {
    header:true,
    skipEmptyLines:true,
    complete: res => {
      data = res.data;
      populateDropdown();
    }
  });
}

function populateDropdown(){
  let challenges = [...new Set(data.map(d => (d.challenge_id || "").trim()))];

  let d1 = document.getElementById("challenge");
  let d2 = document.getElementById("challenge2");

  d1.innerHTML = "";
  d2.innerHTML = "";

  challenges.forEach(c=>{
    if(!c) return;
    d1.add(new Option(c,c));
    d2.add(new Option(c,c));
  });

  analyze();
}

document.getElementById("challenge").onchange = analyze;
document.getElementById("challenge2").onchange = analyze;

function getStats(ch){
  let f = data.filter(d => (d.challenge_id || "").trim() === ch);

  let total = f.length;
  let completed = f.filter(d => d.completed === "Yes").length;
  let zero = f.filter(d => Number(d.matches_played) === 0).length;

  return {
    total,
    completion: total ? (completed/total*100) : 0,
    zero: total ? (zero/total*100) : 0
  };
}

function analyze(){

  let c1 = document.getElementById("challenge").value;
  let s1 = getStats(c1);

  document.getElementById("output").innerHTML = `
  <div class="card">
  Completion: ${s1.completion.toFixed(1)}%<br>
  Zero Match: ${s1.zero.toFixed(1)}%
  </div>
  `;

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Completion", "Zero"],
      datasets: [{ data: [s1.completion, s1.zero] }]
    }
  });
}

// SUMMARY
function extract(text, label){
  let m = text.match(new RegExp(label + "[:]?\\s*(\\d+)", "i"));
  return m ? Number(m[1]) : 0;
}

function parseSummary(){
  let t = document.getElementById("summaryText").value;

  let total = extract(t, "Total Users Joined");
  let completed = extract(t, "Total Users Completed");
  let zero = extract(t, "Users who played 0 matches");

  let completion = (completed/total*100).toFixed(1);
  let zeroRate = (zero/total*100).toFixed(1);

  document.getElementById("summaryOutput").innerHTML = `
  <div class="card">
  Completion: ${completion}%<br>
  Zero Match: ${zeroRate}%
  </div>
  `;
}

// FUNNEL
function analyzeFunnel(){
  let t = document.getElementById("funnelText").value;

  let played = extract(t, "played");
  let joined = extract(t, "joined");
  let completed = extract(t, "completed");

  let drop = ((joined - completed)/joined*100).toFixed(1);

  document.getElementById("funnelOutput").innerHTML = `
  <div class="card">
  Completion Drop: ${drop}%
  </div>
  `;
}

// 🧠 AI ENGINE
function analyzeAI(){

  let text = document.getElementById("aiInput").value.toLowerCase();

  let insights = "";
  let questions = "";
  let actions = "";

  if(text.includes("0 match") || text.includes("zero")){
    insights += "🚨 Users not reaching first match<br>";
    actions += "👉 Improve onboarding & nudges<br>";
  }

  if(text.includes("completed") && text.includes("joined")){
    insights += "⚠️ Completion gap exists<br>";
    questions += "👉 What % completes after joining?<br>";
  }

  if(text.includes("repeat")){
    insights += "⚠️ Retention low<br>";
    questions += "👉 What % users return?<br>";
  }

  questions += `
  👉 Where is biggest drop?<br>
  👉 Which users perform best?<br>
  👉 What data is missing?<br>
  `;

  actions += `
  👉 Fix biggest drop first<br>
  👉 Run small experiments<br>
  👉 Track weekly improvement<br>
  `;

  document.getElementById("aiOutput").innerHTML = `
  <div class="card"><b>Insights:</b><br>${insights}</div>
  <div class="card"><b>Questions:</b><br>${questions}</div>
  <div class="card"><b>Actions:</b><br>${actions}</div>
  `;
}

</script>

</body>
</html>

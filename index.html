<!DOCTYPE html>
<html>
<head>
  <title>InsightOS Lite (Free)</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding:20px;
      background:#111827;
      color:white;
    }

    textarea, input {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button {
      padding:12px;
      margin-top:10px;
      background:#f59e0b;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1f2937;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS Lite</h1>
<p>Free Analytics Engine — by Arsh</p>

<input type="file" id="fileInput">

<h3>What do you want to analyze?</h3>
<textarea id="goal" placeholder="e.g. high intent users, activation, retention"></textarea>

<button onclick="analyze()">Analyze</button>

<div id="output"></div>

<script>

let data = [];

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function analyze(){

  let goal = document.getElementById("goal").value.toLowerCase();

  let total = data.length;

  let played = data.filter(d => Number(d.Indidividual_matches_same_month) > 0).length;
  let zero = total - played;

  let verified = data.filter(d => 
    (d.Verification_status || "").toLowerCase() === "verified"
  ).length;

  let playedRate = (played/total*100).toFixed(1);

  let insights = "";
  let actions = "";
  let questions = "";

  // 🔥 Smart logic
  if(playedRate < 20){
    insights += "🚨 Very low activation rate<br>";
    actions += "👉 Improve onboarding & first match nudges<br>";
  }

  if(verified/total < 0.5){
    insights += "⚠️ Many users are unverified<br>";
    actions += "👉 Improve verification funnel<br>";
  }

  if(zero > played){
    insights += "⚠️ Majority users are inactive<br>";
  }

  // 🧠 thinking layer
  questions += `
  👉 What % users play within 3 days?<br>
  👉 Which cities have higher engagement?<br>
  👉 Are verified users more active?<br>
  `;

  actions += `
  👉 Focus on first match experience<br>
  👉 Segment active vs inactive users<br>
  👉 Run small experiments<br>
  `;

  document.getElementById("output").innerHTML = `
  <div class="card">
  <b>📊 Metrics</b><br>
  Total Users: ${total}<br>
  Played Match: ${played} (${playedRate}%)<br>
  Not Played: ${zero}
  </div>

  <div class="card">
  <b>🧠 Insights</b><br>${insights}
  </div>

  <div class="card">
  <b>🚀 Actions</b><br>${actions}
  </div>

  <div class="card">
  <b>❓ Next Questions</b><br>${questions}
  </div>
  `;
}

</script>

</body>
</html>

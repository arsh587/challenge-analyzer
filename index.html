<!DOCTYPE html>
<html>
<head>
  <title>InsightOS Smart — by Arsh</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      padding:20px;
      background:#020617;
      color:white;
    }

    h1 { color:#22c55e; }

    input, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    button {
      background:#22c55e;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS Smart</h1>
<p>Context-Aware Analytics Engine — by Arsh</p>

<input type="file" id="fileInput">
<button onclick="analyze()">Analyze Automatically</button>

<div id="output"></div>

<script>

let data = [];

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function findCol(keywords){
  let keys = Object.keys(data[0]);
  return keys.find(k => keywords.some(w => k.toLowerCase().includes(w)));
}

function analyze(){

  if(data.length === 0){
    alert("Upload file first");
    return;
  }

  let total = data.length;

  let playerCol = findCol(["player","user"]);
  let matchCol = findCol(["match"]);
  let avgCol = findCol(["avg"]);
  let monthCol = findCol(["month"]);

  let output = "";

  // 🔥 ACTIVATION LOGIC
  if(matchCol && playerCol){

    let totalPlayers = data.reduce((sum,d)=> sum + Number(d[playerCol]||0),0);
    let activePlayers = data.reduce((sum,d)=> sum + Number(d[matchCol]||0),0);

    let activation = ((activePlayers/totalPlayers)*100).toFixed(1);

    output += `
    <div class="card">
    <b>📊 Activation Analysis</b><br>
    Total Users: ${totalPlayers}<br>
    Active Users: ${activePlayers}<br>
    Activation Rate: ${activation}%
    </div>
    `;

    if(activation < 30){
      output += `
      <div class="card">
      🚨 <b>Critical Insight</b><br>
      Most users are not engaging after signup → major activation issue
      </div>
      `;
    }
  }

  // 🔥 AVG MATCH
  if(avgCol){
    let avg = data.reduce((s,d)=>s+Number(d[avgCol]||0),0)/data.length;

    if(avg < 1){
      output += `
      <div class="card">
      ⚠️ <b>Low Engagement Depth</b><br>
      Users are playing very few matches after joining
      </div>
      `;
    }
  }

  // 🔥 TREND
  if(monthCol && matchCol){

    output += `<div class="card"><b>📈 Trend Analysis</b><br>`;

    data.forEach(d=>{
      output += `${d[monthCol]} → ${d[matchCol]} matches<br>`;
    });

    output += `</div>`;
  }

  // 🔥 RECOMMENDATIONS
  output += `
  <div class="card">
  <b>🚀 Recommendations</b><br>
  👉 Improve first match onboarding<br>
  👉 Add nudges for inactive users<br>
  👉 Push challenges early<br>
  👉 Track 0-match users<br>
  </div>
  `;

  // 🔥 NEXT QUESTIONS
  output += `
  <div class="card">
  <b>❓ What to Analyze Next</b><br>
  👉 Users who never played<br>
  👉 3-day activation rate<br>
  👉 Repeat users behavior<br>
  </div>
  `;

  document.getElementById("output").innerHTML = output;
}

</script>

</body>
</html>

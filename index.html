<!DOCTYPE html>
<html>
<head>
  <title>Challenge Analyzer Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5;}
    textarea { width:100%; height:120px; }
    button { padding:10px; margin-top:10px; }
    select { padding:8px; margin-top:10px; margin-right:10px; }
    input { padding:8px; margin-top:5px; width:200px; }

    .card {
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h2>🚀 Challenge Performance Analyzer (Pro)</h2>

<h3>Paste CSV Data</h3>
<textarea id="data"></textarea>

<h3>OR Upload CSV</h3>
<input type="file" id="fileInput">

<br>
<button onclick="loadData()">Analyze</button>

<br><br>

<select id="challenge"></select>
<select id="challenge2"></select>

<div id="output"></div>
<canvas id="chart"></canvas>

<!-- 🔥 SUMMARY ANALYZER -->
<h2>📊 Summary Analyzer</h2>

<div class="card">
Total Users: <input id="totalUsers"><br>
Users Completed: <input id="completedUsers"><br>
Zero Match Users: <input id="zeroUsers"><br>
Repeat Users: <input id="repeatUsers"><br>

<button onclick="analyzeSummary()">Analyze Summary</button>
</div>

<div id="summaryOutput"></div>

<script>

let data = [];
let chart;

// CSV Upload
document.getElementById("fileInput").addEventListener("change", function(e){
  let file = e.target.files[0];

  Papa.parse(file,{
    header:true,
    skipEmptyLines:true,
    complete:function(res){
      data = res.data;
      populateDropdown();
    }
  });
});

// Paste Data
function loadData(){
  let text = document.getElementById("data").value;

  Papa.parse(text,{
    header:true,
    skipEmptyLines:true,
    complete:function(res){
      data = res.data;
      populateDropdown();
    }
  });
}

// Dropdown
function populateDropdown(){
  let challenges = [...new Set(data.map(d => (d.challenge_id || "").trim()))];

  let d1 = document.getElementById("challenge");
  let d2 = document.getElementById("challenge2");

  d1.innerHTML = "";
  d2.innerHTML = "";

  challenges.forEach(c=>{
    if(!c) return;
    d1.add(new Option(c,c));
    d2.add(new Option(c,c));
  });

  analyze();
}

document.getElementById("challenge").onchange = analyze;
document.getElementById("challenge2").onchange = analyze;

// Stats
function getStats(ch){
  let f = data.filter(d => (d.challenge_id || "").trim() === ch);

  let total = f.length;
  let completed = f.filter(d => d.completed === "Yes").length;
  let zero = f.filter(d => Number(d.matches_played) === 0).length;

  let low = f.filter(d => Number(d.matches_played) <=1).length;
  let mid = f.filter(d => Number(d.matches_played)>=2 && Number(d.matches_played)<=3).length;
  let high = f.filter(d => Number(d.matches_played)>3).length;

  return {
    total,
    completion: total ? (completed/total*100) : 0,
    zero: total ? (zero/total*100) : 0,
    low, mid, high
  };
}

// Main analysis
function analyze(){

  let c1 = document.getElementById("challenge").value;
  let c2 = document.getElementById("challenge2").value;

  let s1 = getStats(c1);
  let s2 = getStats(c2);

  let insight = "";

  if(s1.zero > 40){
    insight = "🚨 High drop before first match → Activation issue";
  }
  else if(s1.completion < 40){
    insight = "⚠️ Low completion → Challenge too difficult or unclear";
  }
  else if(s1.completion > 70){
    insight = "🔥 Strong engagement → Challenge working well";
  }
  else{
    insight = "⚖️ Moderate performance → Needs optimization";
  }

  let compare = `
  <div class="card">
  <b>Comparison (${c1} vs ${c2})</b><br>
  Completion Diff: ${(s1.completion - s2.completion).toFixed(1)}%<br>
  Zero Match Diff: ${(s1.zero - s2.zero).toFixed(1)}%
  </div>
  `;

  document.getElementById("output").innerHTML = `

  <div class="card">
  <b>Participants:</b> ${s1.total}<br>
  <b>Completion:</b> ${s1.completion.toFixed(1)}%<br>
  <b>Zero Match:</b> ${s1.zero.toFixed(1)}%
  </div>

  <div class="card">
  <b>User Segments</b><br>
  Low (0-1): ${s1.low}<br>
  Medium (2-3): ${s1.mid}<br>
  High (4+): ${s1.high}
  </div>

  <div class="card">
  <b>Insight:</b><br>${insight}
  </div>

  ${compare}
  `;

  // Chart
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Completion %", "Zero Match %"],
      datasets: [{
        label: c1,
        data: [s1.completion, s1.zero]
      }]
    }
  });
}

// 🔥 SUMMARY ANALYZER LOGIC
function analyzeSummary(){

  let total = Number(document.getElementById("totalUsers").value);
  let completed = Number(document.getElementById("completedUsers").value);
  let zero = Number(document.getElementById("zeroUsers").value);
  let repeat = Number(document.getElementById("repeatUsers").value);

  if(!total) return alert("Enter total users");

  let completionRate = (completed/total*100).toFixed(1);
  let zeroRate = (zero/total*100).toFixed(1);
  let repeatRate = (repeat/total*100).toFixed(1);

  let insight = "";
  let recommendation = "";

  if(zeroRate > 40){
    insight += "🚨 High drop before first match<br>";
    recommendation += "👉 Improve onboarding & first match nudges<br>";
  }

  if(completionRate < 10){
    insight += "⚠️ Very low completion rate<br>";
    recommendation += "👉 Simplify challenges & add rewards<br>";
  }

  if(repeatRate < 20){
    insight += "⚠️ Low retention<br>";
    recommendation += "👉 Add streaks, leaderboard & incentives<br>";
  }

  document.getElementById("summaryOutput").innerHTML = `
    <div class="card">
    <b>Completion Rate:</b> ${completionRate}%<br>
    <b>Zero Match Rate:</b> ${zeroRate}%<br>
    <b>Repeat Rate:</b> ${repeatRate}%<br>
    </div>

    <div class="card">
    <b>Insights:</b><br>${insight}
    </div>

    <div class="card">
    <b>Recommendations:</b><br>${recommendation}
    </div>
  `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Growth Analytics Tool</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5;}
    textarea { width:100%; height:120px; }
    button { padding:10px; margin-top:10px; }
    select { padding:8px; margin-top:10px; margin-right:10px; }

    .card {
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h2>🚀 Growth Analytics Tool</h2>

<!-- CSV ANALYZER -->
<h3>Challenge Analyzer</h3>
<textarea id="data"></textarea>
<input type="file" id="fileInput">
<br>
<button onclick="loadData()">Analyze</button>

<br><br>
<select id="challenge"></select>
<select id="challenge2"></select>

<div id="output"></div>
<canvas id="chart"></canvas>

<!-- SUMMARY ANALYZER -->
<h2>📊 Smart Summary Analyzer</h2>

<div class="card">
<textarea id="summaryText" placeholder="Paste full report..."></textarea>
<br>
<button onclick="parseSummary()">Analyze Summary</button>
</div>

<div id="summaryOutput"></div>
<canvas id="summaryChart"></canvas>

<!-- FUNNEL ANALYZER -->
<h2>🚀 Opportunity Analyzer</h2>

<div class="card">
<textarea id="funnelText" placeholder="Paste funnel data..."></textarea>
<br>
<button onclick="analyzeFunnel()">Analyze Funnel</button>
</div>

<div id="funnelOutput"></div>

<script>

let data = [];
let chart, summaryChart;

// CSV upload
document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => {
      data = res.data;
      populateDropdown();
    }
  });
});

// paste CSV
function loadData(){
  Papa.parse(document.getElementById("data").value, {
    header:true,
    skipEmptyLines:true,
    complete: res => {
      data = res.data;
      populateDropdown();
    }
  });
}

// dropdown
function populateDropdown(){
  let challenges = [...new Set(data.map(d => (d.challenge_id || "").trim()))];

  let d1 = document.getElementById("challenge");
  let d2 = document.getElementById("challenge2");

  d1.innerHTML = "";
  d2.innerHTML = "";

  challenges.forEach(c=>{
    if(!c) return;
    d1.add(new Option(c,c));
    d2.add(new Option(c,c));
  });

  analyze();
}

document.getElementById("challenge").onchange = analyze;
document.getElementById("challenge2").onchange = analyze;

// stats
function getStats(ch){
  let f = data.filter(d => (d.challenge_id || "").trim() === ch);

  let total = f.length;
  let completed = f.filter(d => d.completed === "Yes").length;
  let zero = f.filter(d => Number(d.matches_played) === 0).length;

  return {
    total,
    completion: total ? (completed/total*100) : 0,
    zero: total ? (zero/total*100) : 0
  };
}

// main analyzer
function analyze(){

  let c1 = document.getElementById("challenge").value;
  let c2 = document.getElementById("challenge2").value;

  let s1 = getStats(c1);
  let s2 = getStats(c2);

  let insight = s1.zero > 40
    ? "🚨 Activation issue"
    : s1.completion < 40
    ? "⚠️ Low completion"
    : "✅ Healthy";

  document.getElementById("output").innerHTML = `
  <div class="card">
  Completion: ${s1.completion.toFixed(1)}%<br>
  Zero: ${s1.zero.toFixed(1)}%
  </div>

  <div class="card">
  Insight: ${insight}
  </div>

  <div class="card">
  Compare Diff: ${(s1.completion - s2.completion).toFixed(1)}%
  </div>
  `;

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Completion", "Zero"],
      datasets: [{ data: [s1.completion, s1.zero] }]
    }
  });
}

// SUMMARY PARSER
function extract(text, label){
  let m = text.match(new RegExp(label + "[:]?\\s*(\\d+)", "i"));
  return m ? Number(m[1]) : 0;
}

function parseSummary(){

  let t = document.getElementById("summaryText").value;

  let total = extract(t, "Total Users Joined");
  let completed = extract(t, "Total Users Completed");
  let zero = extract(t, "Users who played 0 matches");
  let repeat = extract(t, "Total Repeat Users");

  let completion = (completed/total*100).toFixed(1);
  let zeroRate = (zero/total*100).toFixed(1);
  let repeatRate = (repeat/total*100).toFixed(1);

  document.getElementById("summaryOutput").innerHTML = `
  <div class="card">
  Completion: ${completion}%<br>
  Zero: ${zeroRate}%<br>
  Repeat: ${repeatRate}%
  </div>
  `;

  if(summaryChart) summaryChart.destroy();
  summaryChart = new Chart(document.getElementById("summaryChart"), {
    type: "bar",
    data: {
      labels: ["Completion", "Zero", "Repeat"],
      datasets: [{ data: [completion, zeroRate, repeatRate] }]
    }
  });
}

// FUNNEL ANALYZER
function analyzeFunnel(){

  let t = document.getElementById("funnelText").value;

  let played = extract(t, "played");
  let reached = extract(t, "reached");
  let joined = extract(t, "joined");
  let completed = extract(t, "completed");

  let joinDrop = ((reached - joined)/reached*100).toFixed(1);
  let compDrop = ((joined - completed)/joined*100).toFixed(1);

  document.getElementById("funnelOutput").innerHTML = `
  <div class="card">
  Join Drop: ${joinDrop}%<br>
  Completion Drop: ${compDrop}%
  </div>
  `;
}

</script>

</body>
</html>

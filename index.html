<!DOCTYPE html>
<html>
<head>
  <title>InsightOS Pro — by Arsh</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      padding:20px;
      background:#0f172a;
      color:white;
    }

    h1 { color:#22c55e; }

    textarea, input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:#1e293b;
      color:white;
    }

    button {
      padding:12px;
      margin-top:10px;
      background:#22c55e;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS Pro</h1>
<p>Accurate Data Analytics Engine — by Arsh</p>

<input type="file" id="fileInput">

<h3>Ask your question</h3>
<textarea id="query" placeholder="e.g. how many users joined challenges and played matches from madhya pradesh"></textarea>

<button onclick="analyze()">Analyze</button>

<div id="output"></div>

<script>

let data = [];

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

// 🔥 detect columns
function detectColumn(keyword){
  let keys = Object.keys(data[0]);
  return keys.find(k => k.toLowerCase().includes(keyword));
}

function analyze(){

  let q = document.getElementById("query").value.toLowerCase();

  if(data.length === 0){
    alert("Upload data first");
    return;
  }

  let stateCol = detectColumn("state");
  let matchCol = detectColumn("match");
  let joinCol = detectColumn("join");

  let result = data;

  // 🔥 location filter
  let stateMatch = q.match(/from (.+)/);
  if(stateMatch && stateCol){
    let state = stateMatch[1].trim();
    result = result.filter(d =>
      (d[stateCol]||"").toLowerCase().includes(state)
    );
  }

  // 🔥 played match filter
  if(q.includes("played")){
    result = result.filter(d => Number(d[matchCol]) > 0);
  }

  // 🔥 joined filter
  if(q.includes("join")){
    result = result.filter(d =>
      (d[joinCol]||"").toLowerCase() === "yes"
    );
  }

  let count = result.length;

  document.getElementById("output").innerHTML = `
  <div class="card">
  <b>Answer:</b><br>
  ${count} users match your criteria
  </div>

  <div class="card">
  <b>Insights:</b><br>
  👉 Filter applied: ${q}<br>
  👉 Result set size: ${count}<br>
  </div>
  `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>InsightOS Pro — by Arsh</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      padding:20px;
      background:#020617;
      color:white;
    }

    h1 { color:#22c55e; }

    textarea, input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:#1e293b;
      color:white;
    }

    button {
      padding:12px;
      margin-top:10px;
      background:#22c55e;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🚀 InsightOS Pro</h1>
<p>Context-Based Analytics Engine — by Arsh</p>

<input type="file" id="fileInput">

<textarea id="query" placeholder="e.g. analyze activation of new users"></textarea>

<button onclick="analyze()">Analyze</button>

<div id="output"></div>

<script>

let data = [];

document.getElementById("fileInput").addEventListener("change", function(e){
  Papa.parse(e.target.files[0], {
    header:true,
    skipEmptyLines:true,
    complete: res => data = res.data
  });
});

function findColumn(keywords){
  let keys = Object.keys(data[0]);
  return keys.find(k => keywords.some(word => k.toLowerCase().includes(word)));
}

function analyze(){

  let q = document.getElementById("query").value.toLowerCase();

  if(data.length === 0){
    alert("Upload data first");
    return;
  }

  let output = "";

  // 🔥 ACTIVATION ANALYSIS
  if(q.includes("activation")){

    let usersCol = findColumn(["player","user"]);
    let matchCol = findColumn(["match"]);

    let totalUsers = data.reduce((sum,d)=> sum + Number(d[usersCol]||0),0);
    let activeUsers = data.reduce((sum,d)=> sum + Number(d[matchCol]||0),0);

    let rate = ((activeUsers/totalUsers)*100).toFixed(2);

    output = `
    <div class="card">
    <b>📊 Activation Analysis</b><br>
    Total Users: ${totalUsers}<br>
    Active Users: ${activeUsers}<br>
    Activation Rate: ${rate}%
    </div>

    <div class="card">
    <b>🧠 Insights</b><br>
    ${rate < 20 ? "🚨 Very low activation — most users not engaging<br>" : ""}
    👉 Huge drop after signup<br>
    👉 Engagement starts late or never<br>
    </div>

    <div class="card">
    <b>🚀 Recommendations</b><br>
    👉 Improve first match experience<br>
    👉 Add onboarding nudges<br>
    👉 Push challenges early<br>
    </div>
    `;
  }

  // 🔥 ENGAGEMENT ANALYSIS
  else if(q.includes("engagement")){

    let avgCol = findColumn(["avg"]);

    output = `
    <div class="card">
    <b>📊 Engagement Analysis</b><br>
    Avg Matches per User: ${data[0][avgCol]}
    </div>

    <div class="card">
    <b>🧠 Insight</b><br>
    🚨 Low engagement depth — users not playing enough matches
    </div>
    `;
  }

  // fallback
  else {
    output = `
    <div class="card">
    Try queries like:<br>
    👉 analyze activation<br>
    👉 analyze engagement<br>
    👉 activation of new users<br>
    </div>
    `;
  }

  document.getElementById("output").innerHTML = output;
}

</script>

</body>
</html>
